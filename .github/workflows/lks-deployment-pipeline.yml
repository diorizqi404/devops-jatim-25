name: LKS Deployment Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'leantime/**'
      - 'gatus/**'
      - '.github/workflows/lks-deployment-pipeline.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: Iks-gatus
  ECS_CLUSTER: Iks-oss-cluster
  
  # Variabel Leantime
  ECS_LEANTIME_SERVICE: leantime-service
  LEANTIME_TASK_DEFINITION: leantime/task-definition.json
  LEANTIME_URL: "http://${{ secrets.ALB_ENDPOINT }}"
  
  # Variabel Gatus
  ECS_GATUS_SERVICE: gatus-service
  GATUS_TASK_DEFINITION: gatus/task-definition.json
  GATUS_URL: "http://${{ secrets.ALB_ENDPOINT }}:8080"

permissions:
  contents: read

jobs:
  deploy-leantime:
    name: Deploy Leantime App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ env.LEANTIME_TASK_DEFINITION }}
          service: ${{ env.ECS_LEANTIME_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          force-new-deployment: true

  build-and-deploy-gatus:
    name: Deploy Gatus App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Update Gatus Configuration
        run: |
          sed -i "s|<github-token>|${{ secrets.TOKEN }}|g" gatus/config/config.yaml 
          sed -i "s|<leantime-url>|${{ env.LEANTIME_URL }}|g" gatus/config/config.yaml
          sed -i "s|<gatus-url>|${{ env.GATUS_URL }}|g" gatus/config/config.yaml
          echo "Gatus configuration updated."

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push --all-tags $ECR_REGISTRY/$ECR_REPOSITORY
          echo "IMAGE_FULL_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Task Definition Image
        run: |
          sed -i "s|<task-def-image>|$IMAGE_FULL_URI|g" ${{ env.GATUS_TASK_DEFINITION }}
          echo "Task definition updated with image $IMAGE_FULL_URI"

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ env.GATUS_TASK_DEFINITION }}
          service: ${{ env.ECS_GATUS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          force-new-deployment: true
